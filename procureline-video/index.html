<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #FAF9F6;
        color: #1A1A1C;
        font-family: 'Inter', sans-serif;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .placeholder-text {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 3rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: rgba(26, 26, 28, 0.15);
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <div class="placeholder-text" data-layout-allow-overflow>Blank Canvas</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Placeholder animation to satisfy timelines requirement
      tl.to(".placeholder-text", { opacity: 0.5, duration: 1.0 }, 0.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
