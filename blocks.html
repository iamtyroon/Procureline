<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Procurement Plan Blockly Editor</title>
    <!-- Load the Blockly library -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
      /* Basic styling */
      html, body {
        height: 100%;
        margin: 0;
        font-family: sans-serif;
      }
      #blocklyDiv {
        height: 100vh;
        width: 100%;
      }

      /* Over-Budget Warning Animation */
      @keyframes blinker { 50% { opacity: 0.6; } }
      .over-budget > .blocklyPath {
        fill: #ff8a80;
        stroke: #d50000;
        stroke-width: 3px;
        animation: blinker: 1.5s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="blocklyDiv"></div>

    <xml id="toolbox" style="display: none">
      <category name="Procurement Plan" colour="225">
        <block type="aggregate_plan_block"></block>
        <block type="department_block"></block>
        <block type="category_block"></block>
        <block type="item_block"></block>
      </category>
      <category name="Timeline Tracking" colour="120">
        <block type="planned_timing_block"></block>
        <block type="actual_timing_block"></block>
        <block type="variance_timing_block"></block>
      </category>
    </xml>

    <script>
      const MAIN_CONNECTION_TYPE = ["department_block", "planned_timing_block", "actual_timing_block", "variance_timing_block"];

      // --- Block definition for the inside of the mutator ---
      Blockly.defineBlocksWithJsonArray([{
        "type": "department_config",
        "message0": "Department Settings %1 Vote Number: %2 %3 Budget: %4",
        "args0": [
          { "type": "input_dummy" },
          { "type": "field_input", "name": "VOTE_NUMBER", "text": "VOTE-001" },
          { "type": "input_dummy" },
          { "type": "field_number", "name": "BUDGET", "value": 100000 }
        ],
        "colour": 230,
        "tooltip": "Set the vote number and budget for the department.",
        "helpUrl": ""
      }]);

      // --- Department block defined in JavaScript for precise layout control ---
      Blockly.Blocks['department_block'] = {
        init: function() {
          // --- THIS IS THE FIX ---
          // Step 1: Create the first row with the name field.
          this.appendDummyInput()
              .appendField("Department:")
              .appendField(new Blockly.FieldTextInput("Department Name"), "DEPT_NAME");
          
          // Step 2: Create a second, right-aligned input on the same row.
          // This acts as a spacer that pushes the mutator icon to the right.
          this.appendDummyInput('MUTATOR_ALIGN')
              .setAlign(Blockly.inputs.Align.RIGHT);

          // Step 3: Tell Blockly to render the two inputs above on the same line.
          this.setInputsInline(true);

          // --- The rest of the block definition ---
          this.appendStatementInput("CATEGORIES")
              .setCheck("category_block");
          this.appendDummyInput()
              .setAlign(Blockly.inputs.Align.RIGHT)
              .appendField("Department Total:")
              .appendField(new Blockly.FieldLabelSerializable("0.00"), "DEPT_TOTAL");
          
          this.setPreviousStatement(true, MAIN_CONNECTION_TYPE);
          this.setNextStatement(true, MAIN_CONNECTION_TYPE);
          this.setColour(225);
          this.setTooltip("Click the gear icon to set budget and vote number.");

          this.voteNumber_ = "VOTE-001";
          this.budget_ = 100000;
          this.setMutator(new Blockly.icons.MutatorIcon(['department_config'], this));
        },
        decompose: function(workspace) {
          const containerBlock = workspace.newBlock('department_config');
          containerBlock.initSvg();
          containerBlock.setFieldValue(this.voteNumber_, 'VOTE_NUMBER');
          containerBlock.setFieldValue(this.budget_, 'BUDGET');
          return containerBlock;
        },
        compose: function(containerBlock) {
          this.voteNumber_ = containerBlock.getFieldValue('VOTE_NUMBER');
          this.budget_ = Number(containerBlock.getFieldValue('BUDGET'));
        }
      };

      Blockly.defineBlocksWithJsonArray([
        { "type": "aggregate_plan_block", "message0": "ANNUAL PROCUREMENT PLAN FOR F/Y %1", "args0": [{"type": "field_input", "name": "FINANCIAL_YEAR", "text": "2025-2026"}], "message1": "%1", "args1": [{"type": "input_statement", "name": "DEPARTMENTS", "check": MAIN_CONNECTION_TYPE}], "message2": "ANNUAL GRAND Total: %1", "args2": [{"type": "field_label", "name": "GRAND_TOTAL", "text": "0.00"}], "message3": "AGPO (30%%): %1", "args3": [{"type": "field_label", "name": "AGPO_CALCULATED", "text": "0.00"}], "message4": "PWD (2%%): %1", "args4": [{"type": "field_label", "name": "PWD_CALCULATED", "text": "0.00"}], "message5": "LOCAL CONTENT (40%%): %1", "args5": [{"type": "field_label", "name": "LOCAL_CONTENT_CALCULATED", "text": "0.00"}], "colour": 50, "tooltip": "The main container for the entire procurement plan.", "helpUrl": ""},
        { "type": "category_block", "message0": "Category: %1", "args0": [{"type": "field_input", "name": "CATEGORY_NAME", "text": "Category Name"}], "message1": "%1", "args1": [{"type": "input_statement", "name": "ITEMS", "check": "item_block"}], "message2": "Q1: %1 | Q2: %2 | Q3: %3 | Q4: %4 | Grand Total: %5", "args2": [ {"type": "field_label", "name": "CAT_Q1_TOTAL", "text": "0.00"}, {"type": "field_label", "name": "CAT_Q2_TOTAL", "text": "0.00"}, {"type": "field_label", "name": "CAT_Q3_TOTAL", "text": "0.00"}, {"type": "field_label", "name": "CAT_Q4_TOTAL", "text": "0.00"}, {"type": "field_label", "name": "CATEGORY_GRAND_TOTAL", "text": "0.00"} ], "previousStatement": "category_block", "nextStatement": "category_block", "colour": 195, "tooltip": "Category with quarterly subtotals." },
        { "type": "item_block", "message0": "Item: %1", "args0": [{"type": "field_input", "name": "ITEM_DESC", "text": "Item Description"}], "message1": "Unit of M.: %1", "args1": [{"type": "field_input", "name": "UNIT_OF_MEASUREMENT", "text": "Pcs"}], "message2": "Unit Price: %1", "args2": [{"type": "field_number", "name": "UNIT_PRICE", "value": 0, "min": 0, "precision": 0.01}], "message3": "Proc. Method: %1", "args3": [{ "type": "field_dropdown", "name": "PROC_METHOD", "options": [ ["Request for Quote", "RFQ"], ["Open Tender", "TENDER"], ["Direct Procurement", "DIRECT"], ["Low-Value", "LOW_VALUE"] ] }], "message4": "Funds Source: %1", "args4": [{ "type": "field_dropdown", "name": "SOURCE_OF_FUNDS", "options": [ ["Government (GOK)", "GOK"], ["Donor", "DONOR"], ["Internal", "INTERNAL"] ] }], "message5": "Q1 Qty: %1 Q2 Qty: %2", "args5": [{"type": "field_number", "name": "Q1_QTY", "value": 0, "min": 0}, {"type": "field_number", "name": "Q2_QTY", "value": 0, "min": 0}], "message6": "Q3 Qty: %1 Q4 Qty: %2", "args6": [{"type": "field_number", "name": "Q3_QTY", "value": 0, "min": 0}, {"type": "field_number", "name": "Q4_QTY", "value": 0, "min": 0}], "message7": "Total Qty: %1 | Total Cost: %2", "args7": [{"type": "field_label", "name": "ITEM_TOTAL_QTY", "text": "0"}, {"type": "field_label", "name": "ITEM_TOTAL_COST", "text": "0.00"}], "previousStatement": "item_block", "nextStatement": "item_block", "colour": 160, "tooltip": "A single procurement item with all necessary details.", "inputsInline": true },
        { "type": "planned_timing_block", "message0": "PLANNED TIMING", "message1": "Time process days: %1", "args1": [{"type":"field_input", "name":"FIELD1", "text":"_"}], "message2": "Invite/Advertisement: %1", "args2": [{"type":"field_input", "name":"FIELD2", "text":"_"}], "message3": "Bid Opening: %1", "args3": [{"type":"field_input", "name":"FIELD3", "text":"_"}], "message4": "Bid Evaluation: %1", "args4": [{"type":"field_input", "name":"FIELD4", "text":"_"}], "message5": "Tender Award: %1", "args5": [{"type":"field_input", "name":"FIELD5", "text":"_"}], "message6": "Notification of Award: %1", "args6": [{"type":"field_input", "name":"FIELD6", "text":"_"}], "message7": "Contract Signing: %1", "args7": [{"type":"field_input", "name":"FIELD7", "text":"_"}], "message8": "Total Time for Contract: %1", "args8": [{"type":"field_input", "name":"FIELD8", "text":"_"}], "message9": "Date of Completion: %1", "args9": [{"type":"field_input", "name":"FIELD9", "text":"_"}], "previousStatement": MAIN_CONNECTION_TYPE, "nextStatement": MAIN_CONNECTION_TYPE, "colour": 210, "tooltip": "Planned dates for procurement milestones.", "inputsInline": true },
        { "type": "actual_timing_block", "message0": "ACTUAL TIMING", "message1": "Time process days: %1", "args1": [{"type":"field_input", "name":"FIELD1", "text":"_"}], "message2": "Invite/Advertisement: %1", "args2": [{"type":"field_input", "name":"FIELD2", "text":"_"}], "message3": "Bid Opening: %1", "args3": [{"type":"field_input", "name":"FIELD3", "text":"_"}], "message4": "Bid Evaluation: %1", "args4": [{"type":"field_input", "name":"FIELD4", "text":"_"}], "message5": "Tender Award: %1", "args5": [{"type":"field_input", "name":"FIELD5", "text":"_"}], "message6": "Notification of Award: %1", "args6": [{"type":"field_input", "name":"FIELD6", "text":"_"}], "message7": "Contract Signing: %1", "args7": [{"type":"field_input", "name":"FIELD7", "text":"_"}], "message8": "Total Time for Contract: %1", "args8": [{"type":"field_input", "name":"FIELD8", "text":"_"}], "message9": "Date of Completion: %1", "args9": [{"type":"field_input", "name":"FIELD9", "text":"_"}], "previousStatement": MAIN_CONNECTION_TYPE, "nextStatement": MAIN_CONNECTION_TYPE, "colour": 120, "tooltip": "Actual dates for procurement milestones.", "inputsInline": true },
        { "type": "variance_timing_block", "message0": "VARIANCE TIMING", "message1": "Time process days: %1", "args1": [{"type":"field_input", "name":"FIELD1", "text":"_"}], "message2": "Invite/Advertisement: %1", "args2": [{"type":"field_input", "name":"FIELD2", "text":"_"}], "message3": "Bid Opening: %1", "args3": [{"type":"field_input", "name":"FIELD3", "text":"_"}], "message4": "Bid Evaluation: %1", "args4": [{"type":"field_input", "name":"FIELD4", "text":"_"}], "message5": "Tender Award: %1", "args5": [{"type":"field_input", "name":"FIELD5", "text":"_"}], "message6": "Notification of Award: %1", "args6": [{"type":"field_input", "name":"FIELD6", "text":"_"}], "message7": "Contract Signing: %1", "args7": [{"type":"field_input", "name":"FIELD7", "text":"_"}], "message8": "Total Time for Contract: %1", "args8": [{"type":"field_input", "name":"FIELD8", "text":"_"}], "message9": "Date of Completion: %1", "args9": [{"type":"field_input", "name":"FIELD9", "text":"_"}], "previousStatement": MAIN_CONNECTION_TYPE, "nextStatement": MAIN_CONNECTION_TYPE, "colour": 45, "tooltip": "Variance between planned and actual dates.", "inputsInline": true }
      ]);
      
      const workspace = Blockly.inject('blocklyDiv', { 
        toolbox: document.getElementById('toolbox'),
        grid: { spacing: 20, length: 3, colour: '#ccc', snap: true },
        move: { scrollbars: true, drag: true, wheel: true },
        zoom: { controls: true, wheel: true, startScale: 1.0 }
      });
      
      function updateTotals(event) {
        if (event.type === Blockly.Events.UI) return;
        let grandTotal = 0; const allBlocks = workspace.getAllBlocks(false); const departmentBlocks = allBlocks.filter(b => b.type === 'department_block');
        Blockly.Events.disable();
        try {
          departmentBlocks.forEach(deptBlock => {
            let departmentTotal = 0; let categoryConnection = deptBlock.getInput('CATEGORIES').connection; let currentCategory = categoryConnection.targetBlock();
            while (currentCategory) {
              let categoryTotal = 0; let catQ1Total = 0, catQ2Total = 0, catQ3Total = 0, catQ4Total = 0;
              let itemConnection = currentCategory.getInput('ITEMS').connection; let currentItem = itemConnection.targetBlock();
              while (currentItem) {
                const unitPrice = currentItem.getFieldValue('UNIT_PRICE') || 0; const q1Qty = currentItem.getFieldValue('Q1_QTY') || 0; const q2Qty = currentItem.getFieldValue('Q2_QTY') || 0; const q3Qty = currentItem.getFieldValue('Q3_QTY') || 0; const q4Qty = currentItem.getFieldValue('Q4_QTY') || 0;
                const totalQty = q1Qty + q2Qty + q3Qty + q4Qty; const totalCost = totalQty * unitPrice;
                currentItem.setFieldValue(totalQty.toString(), 'ITEM_TOTAL_QTY'); currentItem.setFieldValue(totalCost.toFixed(2), 'ITEM_TOTAL_COST');
                catQ1Total += q1Qty * unitPrice; catQ2Total += q2Qty * unitPrice; catQ3Total += q3Qty * unitPrice; catQ4Total += q4Qty * unitPrice; categoryTotal += totalCost; currentItem = currentItem.getNextBlock();
              }
              currentCategory.setFieldValue(catQ1Total.toFixed(2), 'CAT_Q1_TOTAL'); currentCategory.setFieldValue(catQ2Total.toFixed(2), 'CAT_Q2_TOTAL'); currentCategory.setFieldValue(catQ3Total.toFixed(2), 'CAT_Q3_TOTAL'); currentCategory.setFieldValue(catQ4Total.toFixed(2), 'CAT_Q4_TOTAL'); currentCategory.setFieldValue(categoryTotal.toFixed(2), 'CATEGORY_GRAND_TOTAL');
              departmentTotal += categoryTotal; currentCategory = currentCategory.getNextBlock();
            }
            deptBlock.setFieldValue(departmentTotal.toFixed(2), 'DEPT_TOTAL'); grandTotal += departmentTotal;
            const budget = deptBlock.budget_ || 0;
            const isOverBudget = departmentTotal > budget && budget > 0;
            deptBlock.setWarningText(isOverBudget ? `Over budget by ${(departmentTotal - budget).toFixed(2)}` : null);
            if (deptBlock.svgGroup_) {
              if (isOverBudget) {
                Blockly.utils.dom.addClass(deptBlock.svgGroup_, 'over-budget');
              } else {
                Blockly.utils.dom.removeClass(deptBlock.svgGroup_, 'over-budget');
              }
            }
          });
          const aggregateBlock = allBlocks.find(b => b.type === 'aggregate_plan_block');
          if (aggregateBlock) {
            aggregateBlock.setFieldValue(grandTotal.toFixed(2), 'GRAND_TOTAL');
            aggregateBlock.setFieldValue((grandTotal * 0.30).toFixed(2), 'AGPO_CALCULATED');
            aggregateBlock.setFieldValue((grandTotal * 0.02).toFixed(2), 'PWD_CALCULATED');
            aggregateBlock.setFieldValue((grandTotal * 0.40).toFixed(2), 'LOCAL_CONTENT_CALCULATED');
          }
        } finally {
          Blockly.Events.enable();
        }
      }
      workspace.addChangeListener(updateTotals);
    </script>
  </body>
</html>
